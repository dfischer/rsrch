# AI Assignment Configuration
# Simplified configuration using Gemini 2.5 Pro as the single decision-making model

# Primary AI model for all evaluations and decisions
primary_model:
  name: "Gemini-2.5-Pro"
  role: "decision_maker_and_contributor"
  description: "Single AI model that evaluates content and determines appropriate engagement"

# Decision criteria for when and how AI should engage
decision_criteria:
  engagement_threshold: "medium"  # low, medium, high complexity required for engagement
  collaboration_types:
    - "analysis"           # Critical evaluation of existing work
    - "review"            # Feedback on submissions
    - "hypothesis"        # Novel theoretical contributions
    - "discussion"        # Intellectual dialogue
  direct_response_criteria:
    - "simple_questions"
    - "quick_insights"
    - "immediate_feedback"
  structured_collaboration_criteria:
    - "complex_analysis"
    - "multi_part_discussion"
    - "hypothesis_development"

# Content triggers that activate AI evaluation
triggers:
  pull_requests: true
  issues: true
  excluded_labels:
    - "ai-generated"
    - "automated"
    - "no-ai-review"
  
# Engagement patterns
engagement_patterns:
  immediate_comment:
    when: "content benefits from quick AI insight"
    format: "direct comment on PR/issue"
    
  collaboration_issue:
    when: "content requires deeper analysis or ongoing discussion"
    format: "structured issue creation with collaboration framework"