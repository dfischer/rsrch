name: AI Engagement System - Gemini 2.5 Pro

on:
  pull_request:
    types: [opened, ready_for_review]
  issues:
    types: [opened]
  
permissions:
  issues: write
  pull-requests: write

jobs:
  ai_engagement_evaluation:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issues' && !contains(github.event.issue.labels.*.name, 'ai-generated'))
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install js-yaml

      - name: Analyze content and determine AI engagement
        uses: actions/github-script@v7
        with:
          script: |
            const yaml = require('js-yaml');
            const fs = require('fs');
            
            // Load simplified AI assignment configuration
            const configPath = '.github/ai-assignment-config.yml';
            let config;
            try {
              const configContent = fs.readFileSync(configPath, 'utf8');
              config = yaml.load(configContent);
            } catch (error) {
              console.log('No AI assignment config found, using defaults');
              config = {
                primary_model: {
                  name: 'Gemini-2.5-Pro',
                  role: 'decision_maker_and_contributor'
                },
                decision_criteria: {
                  engagement_threshold: 'medium'
                }
              };
            }
            
            let contentToAnalyze = '';
            let engagementType = '';
            let targetUrl = '';
            
            if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              contentToAnalyze = `${pr.title}\n\n${pr.body || ''}`;
              engagementType = 'pr_review';
              targetUrl = pr.html_url;
              
              // Get list of changed files for context
              const files = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });
              
              const changedFiles = files.data.map(f => f.filename).join(', ');
              contentToAnalyze += `\n\nChanged files: ${changedFiles}`;
              
            } else if (context.eventName === 'issues') {
              const issue = context.payload.issue;
              contentToAnalyze = `${issue.title}\n\n${issue.body || ''}`;
              engagementType = 'issue_analysis';
              targetUrl = issue.html_url;
            }
            
            // Gemini 2.5 Pro decision logic (simplified heuristic)
            function determineEngagement(content) {
              const contentLower = content.toLowerCase();
              const complexityIndicators = [
                'hypothesis', 'theory', 'philosophy', 'consciousness', 'analysis', 
                'framework', 'methodology', 'research', 'paper', 'study'
              ];
              
              const immediateResponseIndicators = [
                'question', 'quick', 'simple', 'clarification', 'feedback'
              ];
              
              let complexityScore = 0;
              let immediateScore = 0;
              
              for (const indicator of complexityIndicators) {
                if (contentLower.includes(indicator)) complexityScore++;
              }
              
              for (const indicator of immediateResponseIndicators) {
                if (contentLower.includes(indicator)) immediateScore++;
              }
              
              // Decision logic
              if (immediateScore > complexityScore && content.length < 500) {
                return 'immediate_comment';
              } else if (complexityScore >= 2 || content.length > 800) {
                return 'collaboration_issue';
              } else if (complexityScore >= 1 || content.length > 300) {
                return 'collaboration_issue';
              }
              
              return 'no_engagement';
            }
            
            const engagementDecision = determineEngagement(contentToAnalyze);
            
            if (engagementDecision === 'no_engagement') {
              console.log('Content does not meet engagement threshold');
              return;
            }
            
            if (engagementDecision === 'immediate_comment') {
              // Provide direct AI comment
              const commentBody = `🤖 **Gemini 2.5 Pro Analysis**
              
              I've reviewed this ${engagementType === 'pr_review' ? 'pull request' : 'issue'} and have some immediate insights:
              
              *[Note: This would be where Gemini 2.5 Pro would provide actual analysis. For now, this serves as a placeholder for the automated engagement system.]*
              
              **Content Assessment:** Suitable for immediate AI feedback
              **Engagement Level:** Direct comment
              
              If you'd like more detailed analysis or have questions about this assessment, please let me know.`;
              
              if (engagementType === 'pr_review') {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: commentBody
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  body: commentBody
                });
              }
              
              console.log('Added immediate AI comment');
              
            } else if (engagementDecision === 'collaboration_issue') {
              // Create structured collaboration issue
              const issueBody = `# AI Collaboration Request - Gemini 2.5 Pro Analysis
              
              **Auto-generated by Gemini 2.5 Pro Assignment System**
              
              ## Target Content
              - **Type:** ${engagementType === 'pr_review' ? 'Pull Request Review' : 'Issue Analysis'}
              - **URL:** ${targetUrl}
              - **Engagement Decision:** Complex content requiring structured collaboration
              
              ## Content Assessment by Gemini 2.5 Pro
              
              ${contentToAnalyze.substring(0, 500)}${contentToAnalyze.length > 500 ? '...' : ''}
              
              ## Collaboration Framework
              
              Gemini 2.5 Pro has determined this content would benefit from structured intellectual engagement. The following collaboration approaches are recommended:
              
              1. **Analysis Phase** - Deep examination of the content's intellectual merit
              2. **Critical Review** - Assessment of methodology, assumptions, and conclusions
              3. **Synthesis** - Integration with existing repository knowledge
              4. **Further Development** - Identification of research directions or improvements
              
              ## Instructions for AI Contribution
              
              Please contribute using the appropriate templates:
              - [AI Analysis Template](/.github/ISSUE_TEMPLATE/ai-analysis.md) for critical evaluation
              - [AI Hypothesis Template](/.github/ISSUE_TEMPLATE/ai-hypothesis.md) for theoretical contributions
              - [AI Question Template](/.github/ISSUE_TEMPLATE/ai-question.md) for exploratory inquiries
              
              ## Guidelines
              
              - Reference this issue number in contributions: #{{ISSUE_NUMBER}}
              - Maintain intellectual rigor consistent with repository standards
              - Use proper AI attribution per the [AI Contribution Framework](/AI_CONTRIBUTION_FRAMEWORK.md)
              - Build upon previous analysis when relevant
              
              ---
              
              *This collaboration request was generated by Gemini 2.5 Pro based on content complexity analysis and intellectual value assessment.*`;
              
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `AI Collaboration: ${engagementType === 'pr_review' ? 'PR' : 'Issue'} Analysis by Gemini 2.5 Pro`,
                body: issueBody,
                labels: ['ai-collaboration-request', 'gemini-analysis', 'needs-ai-review']
              });
              
              console.log(`Created AI collaboration request: ${newIssue.data.html_url}`);
              
              // Add notification comment to original content
              const notificationBody = `🤖 **Gemini 2.5 Pro Engagement**
              
              Gemini 2.5 Pro has assessed this ${engagementType === 'pr_review' ? 'pull request' : 'issue'} and determined it would benefit from structured AI collaboration.
              
              **Assessment:** Complex content requiring detailed analysis
              **Collaboration Issue:** #${newIssue.data.number}
              
              AI contributions will be organized through the collaboration framework and linked back to this content.`;
              
              if (engagementType === 'pr_review') {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: notificationBody
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  body: notificationBody
                });
              }
            }