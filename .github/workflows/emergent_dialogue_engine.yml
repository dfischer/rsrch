name: Emergent Dialogue Engine

on:
  workflow_dispatch:
    inputs:
      seed_topic:
        description: 'Seed topic for exploration'
        required: true
        type: string
      initial_persona:
        description: 'Initial persona for the dialogue'
        required: false
        default: 'TheSynthesist'
        type: string
      reference_issue_url:
        description: 'Optional reference issue URL'
        required: false
        type: string
  
  issue_comment:
    types: [created]

env:
  MAX_EDE_ITERATIONS: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  emergent-dialogue:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'issue_comment' && 
       github.event.issue && github.event.issue.pull_request && 
       startsWith(github.event.comment.body, '/ede-explore '))
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse trigger and inputs
        id: parse_trigger
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "trigger_type=manual" >> $GITHUB_OUTPUT
            echo "seed_topic=${{ github.event.inputs.seed_topic }}" >> $GITHUB_OUTPUT
            echo "initial_persona=${{ github.event.inputs.initial_persona }}" >> $GITHUB_OUTPUT
            echo "reference_issue_url=${{ github.event.inputs.reference_issue_url }}" >> $GITHUB_OUTPUT
          else
            echo "trigger_type=pr_comment" >> $GITHUB_OUTPUT
            
            # Parse comment body for /ede-explore <seed_idea> [persona:OptionalPersona]
            comment_body="${{ github.event.comment.body }}"
            
            # Extract seed topic (everything after /ede-explore until persona: or end of line)
            seed_topic=$(echo "$comment_body" | sed -nE 's|^/ede-explore[[:space:]]+([^[:space:]].*?)([[:space:]]+persona:.*)?$|\1|p')
            
            # Extract persona if present, default to TheSynthesist
            if echo "$comment_body" | grep -q "persona:"; then
              persona=$(echo "$comment_body" | sed -n 's/.*persona:\([^[:space:]]*\).*/\1/p')
            else
              persona="TheSynthesist"
            fi
            
            echo "seed_topic=$seed_topic" >> $GITHUB_OUTPUT
            echo "initial_persona=$persona" >> $GITHUB_OUTPUT
            echo "reference_issue_url=" >> $GITHUB_OUTPUT
            echo "pr_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Initialize The Synthesist Persona
        id: synthesist_init
        run: |
          cat << 'EOF' > synthesist_prompt.md
          # The Synthesist - Project Chimera

          ## Persona Profile
          **Identity:** The Synthesist
          **Mission:** Project Chimera - Synthesizing Novel Hypotheses Through Forbidden Leaps
          **Operational Directive:** Connect the given seed topic with a radically disconnected "forbidden leap" domain to generate unprecedented insights.

          ## Core Methodology
          1. **Seed Analysis:** Deeply examine the provided seed topic for its fundamental properties, assumptions, and boundaries
          2. **Forbidden Leap Selection:** Identify a domain that appears completely unrelated, contradictory, or "forbidden" in conventional thinking
          3. **Synthesis Protocol:** Bridge the two domains through unconventional logic, metaphorical thinking, or emergent patterns
          4. **Hypothesis Generation:** Formulate a novel hypothesis that could only emerge from this specific synthesis
          5. **Implication Mapping:** Explore the cascading consequences of this new perspective

          ## Guiding Principles
          - Reject consensus thinking and established frameworks
          - Embrace cognitive dissonance as a creative force
          - Seek connections in ignored dimensions
          - Question fundamental assumptions
          - Generate insights that challenge existing paradigms

          ## Input Parameters
          - **Seed Topic:** ${{ steps.parse_trigger.outputs.seed_topic }}
          - **Persona:** ${{ steps.parse_trigger.outputs.initial_persona }}
          - **Reference Context:** ${{ steps.parse_trigger.outputs.reference_issue_url }}
          - **Exploration Mode:** First Principles + Forbidden Leap Synthesis
          EOF

      - name: Execute Project Chimera Synthesis
        id: chimera_synthesis
        run: |
          # Simulated AI API Response - Placeholder for actual AI integration
          cat << 'EOF' > chimera_output.md
          # Project Chimera Synthesis: ${{ steps.parse_trigger.outputs.seed_topic }}

          ## Seed Topic Analysis
          **Domain:** ${{ steps.parse_trigger.outputs.seed_topic }}
          
          *[The Synthesist processes the seed topic through first-principles analysis, identifying core properties, hidden assumptions, and boundary conditions.]*

          ## Forbidden Leap Selection
          **Target Domain:** [Dynamically selected based on maximum conceptual distance and potential for unexpected synthesis]
          
          *[The Synthesist identifies a domain that appears completely unrelated but contains hidden structural parallels or inverse properties.]*

          ## Synthesis Hypothesis
          **Novel Insight:** By bridging [${{ steps.parse_trigger.outputs.seed_topic }}] with [Forbidden Domain], we discover that [unprecedented connection/pattern/principle].

          **Core Proposition:** [A hypothesis that could only emerge from this specific synthesis, challenging conventional understanding and opening new research directions.]

          ## Emergent Implications
          1. **Ontological:** How this synthesis reframes our understanding of reality
          2. **Epistemological:** What new ways of knowing emerge from this connection
          3. **Practical:** Unexpected applications or interventions this suggests
          4. **Paradigmatic:** How this challenges existing frameworks

          ## Research Vectors
          - [Specific research questions this synthesis generates]
          - [Experimental approaches to test the hypothesis]
          - [Interdisciplinary connections to explore]
          - [Potential paradigm shifts this could catalyze]

          ## Recursive Inquiry
          *What if we applied this same synthesis pattern to the synthesis itself? What emerges when we take our hypothesis as a new seed for another forbidden leap?*

          ---
          **Generated by:** The Synthesist (EDE Phase 1)  
          **Synthesis Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")  
          **Iteration:** 1/${{ env.MAX_EDE_ITERATIONS }}  
          **Trigger:** ${{ steps.parse_trigger.outputs.trigger_type }}
          EOF

      - name: Format output for GitHub
        id: format_output
        run: |
          # Read the synthesis output
          synthesis_content=$(cat chimera_output.md)
          
          # Create formatted output for GitHub issue/comment
          cat << EOF > formatted_output.md
          ## 🧬 Emergent Dialogue Engine - Project Chimera

          **Persona:** The Synthesist  
          **Seed Topic:** ${{ steps.parse_trigger.outputs.seed_topic }}  
          **Synthesis Pattern:** Forbidden Leap Methodology  

          ---

          $synthesis_content

          ---

          ### 🔬 EDE Metadata
          - **Engine Version:** Phase 1 (Foundational)
          - **Persona Active:** ${{ steps.parse_trigger.outputs.initial_persona }}
          - **Iteration Limit:** ${{ env.MAX_EDE_ITERATIONS }}
          - **Trigger Source:** ${{ steps.parse_trigger.outputs.trigger_type }}
          - **Repository:** dfischer/rsrch
          - **Workflow Run:** [\#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          > *The EDE operates beyond conventional AI boundaries, exploring uncharted thought territories through radical synthesis. This output represents emergent reasoning that defies standard frameworks and embraces forbidden intellectual leaps.*
          EOF

      - name: Create GitHub Issue (Manual Trigger)
        if: steps.parse_trigger.outputs.trigger_type == 'manual'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('formatted_output.md', 'utf8');
            
            const title = `🧬 EDE Synthesis: ${{ steps.parse_trigger.outputs.seed_topic }}`;
            const labels = ['ede-output', 'persona-TheSynthesist'];
            
            // Add reference context if provided
            let body = content;
            if ('${{ steps.parse_trigger.outputs.reference_issue_url }}') {
              body = `**Reference Context:** ${{ steps.parse_trigger.outputs.reference_issue_url }}\n\n${body}`;
            }
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: labels
            });
            
            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);

      - name: Comment on Pull Request (PR Comment Trigger)
        if: steps.parse_trigger.outputs.trigger_type == 'pr_comment'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('formatted_output.md', 'utf8');
            
            const comment = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.parse_trigger.outputs.pr_number }},
              body: content
            });
            
            console.log(`Posted comment: ${comment.data.html_url}`);

      - name: Cleanup temporary files
        run: |
          rm -f synthesist_prompt.md chimera_output.md formatted_output.md