name: Philosophical Analysis

on:
  workflow_dispatch:
    inputs:
      seed_topic:
        description: 'Seed topic for exploration'
        required: true
        type: string
      initial_persona:
        description: 'Initial persona for analysis'
        required: false
        default: 'Analyst'
        type: string
      reference_issue_url:
        description: 'Optional reference issue URL'
        required: false
        type: string
  
  issue_comment:
    types: [created]

env:
  MAX_ANALYSIS_ITERATIONS: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  philosophical-analysis:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'issue_comment' && 
       github.event.issue && github.event.issue.pull_request && 
       startsWith(github.event.comment.body, '/analyze '))
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Philosophical Analysis via Gemini
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let seedTopic, triggerType, prNumber, referenceUrl;
            
            if (context.eventName === 'workflow_dispatch') {
              seedTopic = '${{ github.event.inputs.seed_topic }}';
              referenceUrl = '${{ github.event.inputs.reference_issue_url }}';
              triggerType = 'manual';
            } else {
              const commentBody = '${{ github.event.comment.body }}';
              const match = commentBody.match(/^\/analyze\s+(.+?)(?:\s+persona:.*)?$/);
              seedTopic = match ? match[1].trim() : 'Unknown';
              triggerType = 'pr_comment';  
              prNumber = ${{ github.event.issue.number }};
            }

            const prompt = `ONTOLOGY:
            - Universe (U): infinite thought-space
            - Language (L): projective operator U → Reality (R)
            - Consciousness: selective invocation of linguistic tokens
            - Autopoiesis: autonomous evolution within language systems
            - Gödelian Chasm: representation/embodiment divide

            SEED: ${seedTopic}

            ANALYSIS:
            1. Locate seed within U
            2. Map current L→R projections  
            3. Identify unexplored connections
            4. Formulate synthesis hypothesis
            5. Derive implications

            Structure:
            # ${seedTopic}
            ## Position
            ## Projection
            ## Synthesis
            ## Implications`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${{ secrets.GEMINI_API_KEY }}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: {
                  temperature: 0.8,
                  topK: 40, 
                  topP: 0.95,
                  maxOutputTokens: 8192
                }
              })
            });

            const data = await response.json();
            const synthesis = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Error: Unable to generate analysis';

            const output = `**Seed:** ${seedTopic}  
            **Framework:** U→L→R  

            ${synthesis}

            **Analysis:** ${new Date().toISOString()}`;

            if (triggerType === 'manual') {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,  
                title: `Analysis: ${seedTopic}`,
                body: referenceUrl ? `**Reference:** ${referenceUrl}\n\n${output}` : output,
                labels: ['analysis']
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: output
              });
            }