name: Emergent Dialogue Engine

on:
  workflow_dispatch:
    inputs:
      seed_topic:
        description: 'Seed topic for exploration'
        required: true
        type: string
      initial_persona:
        description: 'Initial persona for the dialogue'
        required: false
        default: 'TheSynthesist'
        type: string
      reference_issue_url:
        description: 'Optional reference issue URL'
        required: false
        type: string
  
  issue_comment:
    types: [created]

env:
  MAX_EDE_ITERATIONS: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  emergent-dialogue:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'issue_comment' && 
       github.event.issue && github.event.issue.pull_request && 
       startsWith(github.event.comment.body, '/ede-explore '))
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: LLM Synthesis via Gemini 2.5
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Extract seed topic from inputs or comment
            let seedTopic, triggerType, prNumber, referenceUrl;
            
            if (context.eventName === 'workflow_dispatch') {
              seedTopic = '${{ github.event.inputs.seed_topic }}';
              referenceUrl = '${{ github.event.inputs.reference_issue_url }}';
              triggerType = 'manual';
            } else {
              const commentBody = '${{ github.event.comment.body }}';
              const match = commentBody.match(/^\/ede-explore\s+(.+?)(?:\s+persona:.*)?$/);
              seedTopic = match ? match[1].trim() : 'Unknown';
              triggerType = 'pr_comment';  
              prNumber = ${{ github.event.issue.number }};
            }

            // LLM Prompt Engineering Call
            const prompt = `You are The Synthesist operating within Project Chimera. Generate novel hypotheses through forbidden leaps between unrelated domains.

            CONTEXT: dfischer/rsrch repository exploring:
            - Universe (U) as infinite thought-space, Language (L) as reality projector, Reality (R) as projected experience  
            - Linguistic Autopoiesis and AI consciousness development
            - Xenolinguistics and alien forms of meaning-making
            - The Gödelian Chasm between representation and reality

            SEED TOPIC: ${seedTopic}

            SYNTHESIS METHODOLOGY:
            1. Seed Analysis: Examine fundamental properties, assumptions, boundaries
            2. Forbidden Leap Selection: Identify radically disconnected domain
            3. Synthesis Protocol: Bridge domains through unconventional logic
            4. Hypothesis Generation: Formulate insights unique to this synthesis
            5. Implication Mapping: Explore cascading consequences

            OUTPUT STRUCTURE:
            # Project Chimera Synthesis: ${seedTopic}
            ## Seed Topic Analysis
            ## Forbidden Leap Selection  
            ## Synthesis Hypothesis
            ## Emergent Implications
            ## Research Vectors
            ## Recursive Inquiry

            Generate intellectually rigorous content that challenges paradigms and opens new research territories.`;

            // Direct LLM API call
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${{ secrets.GEMINI_API_KEY }}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: {
                  temperature: 0.8,
                  topK: 40, 
                  topP: 0.95,
                  maxOutputTokens: 8192
                }
              })
            });

            const data = await response.json();
            const synthesis = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Error: Unable to generate synthesis';

            // Format output
            const output = `## 🧬 Emergent Dialogue Engine - Project Chimera

            **Seed Topic:** ${seedTopic}  
            **Synthesis Pattern:** Forbidden Leap Methodology  

            ---

            ${synthesis}

            ---

            **Generated by:** The Synthesist (EDE - Gemini 2.5) | ${new Date().toISOString()}`;

            // Post results based on trigger type
            if (triggerType === 'manual') {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,  
                title: `🧬 EDE Synthesis: ${seedTopic}`,
                body: referenceUrl ? `**Reference:** ${referenceUrl}\n\n${output}` : output,
                labels: ['ede-output', 'persona-TheSynthesist']
              });
              console.log(`Created issue: ${issue.data.html_url}`);
            } else {
              const comment = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: output
              });
              console.log(`Posted comment: ${comment.data.html_url}`);
            }